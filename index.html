document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

in: 0;\n}\n\n/* ===================== Buttons ===================== */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 600;\n  font-size: 1.0625rem;\n  letter-spacing: 0.01em;\n  padding: 1rem 2.25rem;\n  border-radius: 999px;\n  border: none;\n  cursor: pointer;\n  transition: transform 0.18s var(--ease), box-shadow 0.25s var(--ease), background 0.2s var(--ease);\n  will-change: transform;\n}\n.btn--primary {\n  background: var(--orange);\n  color: #fff;\n  box-shadow: 0 14px 34px -12px rgba(240, 78, 35, 0.7), inset 0 1px 0 rgba(255,255,255,0.18);\n}\n.btn--primary:hover {\n  background: #ff5a30;\n  transform: translateY(-2px);\n  box-shadow: 0 20px 44px -12px rgba(240, 78, 35, 0.85), inset 0 1px 0 rgba(255,255,255,0.18);\n}\n.btn--primary:active { transform: translateY(0); }\n.btn:focus-visible { outline: 3px solid var(--orange-soft); outline-offset: 3px; }\n\n/* ===================== Logo ===================== */\n.logo {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.55rem;\n  font-family: 'Space Grotesk', sans-serif;\n}\n.logo__word {\n  font-weight: 700;\n  font-size: 1.35rem;\n  letter-spacing: -0.01em;\n  color: var(--white);\n}\n.logo--sm .logo__word { font-size: 1.1rem; }\n.logo__mark { display: block; }\n\n/* ===================== Hero ===================== */\n.hero {\n  position: relative;\n  min-height: 100svh;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1.25rem, 5vw, 3rem) clamp(2rem, 4vw, 3rem);\n  background:\n    radial-gradient(120% 80% at 50% -10%, #34465c 0%, var(--navy) 55%, var(--navy-deep) 100%);\n  overflow: hidden;\n}\n\n/* subtle moving backdrop */\n.hero__bg {\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  background-image:\n    radial-gradient(60% 50% at 50% 38%, rgba(240, 78, 35, 0.16), transparent 70%),\n    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);\n  background-size: 100% 100%, 46px 46px, 46px 46px;\n  -webkit-mask-image: radial-gradient(80% 70% at 50% 35%, #000 35%, transparent 80%);\n          mask-image: radial-gradient(80% 70% at 50% 35%, #000 35%, transparent 80%);\n  animation: drift 22s linear infinite;\n}\n@keyframes drift {\n  from { background-position: 0 0, 0 0, 0 0; }\n  to   { background-position: 0 0, 0 460px, 460px 0; }\n}\n\n.hero__brand {\n  position: relative;\n  z-index: 2;\n  width: 100%;\n  max-width: var(--maxw);\n  display: flex;\n  justify-content: center;\n}\n\n.hero__main {\n  position: relative;\n  z-index: 2;\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n  width: 100%;\n  max-width: var(--maxw);\n  gap: clamp(1.5rem, 3.5vw, 2.5rem);\n  padding: clamp(2rem, 5vh, 4rem) 0 1rem;\n}\n\n.hero__title {\n  font-weight: 700;\n  font-size: clamp(2.1rem, 6.4vw, 4.6rem);\n  line-height: 1.02;\n  text-wrap: balance;\n}\n.hero__title span { display: block; }\n.t-white  { color: var(--white); }\n.t-orange { color: var(--orange); }\n\n.hero__kicker {\n  margin: 0;\n  font-family: 'Space Grotesk', sans-serif;\n  text-transform: uppercase;\n  letter-spacing: 0.32em;\n  font-size: 0.8rem;\n  font-weight: 500;\n  color: var(--muted);\n}\n\n/* ===================== Flip countdown ===================== */\n.countdown {\n  display: flex;\n  flex-wrap: wrap;\n  justify-content: center;\n  gap: clamp(0.6rem, 2.2vw, 1.4rem);\n}\n\n.flip {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 0.7rem;\n}\n\n.flip__card {\n  position: relative;\n  width: clamp(66px, 17vw, 116px);\n  height: clamp(92px, 23vw, 156px);\n  perspective: 600px;\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: clamp(2.9rem, 12vw, 5.6rem);\n  border-radius: 14px;\n  box-shadow: 0 18px 40px -22px rgba(0,0,0,0.9);\n}\n\n.flip__half {\n  position: absolute;\n  left: 0;\n  right: 0;\n  height: 50%;\n  overflow: hidden;\n  background: linear-gradient(180deg, var(--navy-card-2), var(--navy-card));\n}\n.flip__top, .flip__top-flip {\n  top: 0;\n  border-radius: 14px 14px 0 0;\n  border-bottom: 1px solid rgba(0, 0, 0, 0.4);\n  align-items: flex-end;\n}\n.flip__bottom, .flip__bottom-flip {\n  bottom: 0;\n  border-radius: 0 0 14px 14px;\n  background: linear-gradient(180deg, var(--navy-card), #16212e);\n}\n\n.flip__half span {\n  position: absolute;\n  left: 0;\n  right: 0;\n  height: 200%;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--orange);\n  text-shadow: 0 0 18px rgba(240, 78, 35, 0.55), 0 0 2px rgba(240, 78, 35, 0.6);\n  font-variant-numeric: tabular-nums;\n}\n.flip__top span, .flip__top-flip span { top: 0; }\n.flip__bottom span, .flip__bottom-flip span { bottom: 0; }\n\n/* moving folds */\n.flip__top-flip {\n  transform-origin: bottom;\n  transform: rotateX(0deg);\n  backface-visibility: hidden;\n  z-index: 3;\n}\n.flip__bottom-flip {\n  transform-origin: top;\n  transform: rotateX(90deg);\n  backface-visibility: hidden;\n  z-index: 3;\n}\n.flip--go .flip__top-flip    { animation: foldTop 0.55s linear forwards; }\n.flip--go .flip__bottom-flip { animation: foldBottom 0.55s linear forwards; }\n\n@keyframes foldTop {\n  0%        { transform: rotateX(0deg); }\n  50%, 100% { transform: rotateX(-90deg); }\n}\n@keyframes foldBottom {\n  0%, 50% { transform: rotateX(90deg); }\n  100%    { transform: rotateX(0deg); }\n}\n\n.flip__label {\n  font-family: 'Space Grotesk', sans-serif;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  font-size: clamp(0.6rem, 1.5vw, 0.78rem);\n  font-weight: 500;\n  color: var(--muted);\n}\n\n/* ===================== Scroll cue ===================== */\n.scroll-cue {\n  position: relative;\n  z-index: 2;\n  display: inline-flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 0.55rem;\n  color: var(--muted);\n  padding: 0.5rem 1rem;\n  border-radius: 999px;\n  transition: color 0.2s var(--ease);\n}\n.scroll-cue:hover { color: var(--white); }\n.scroll-cue__text {\n  font-family: 'Space Grotesk', sans-serif;\n  font-size: 0.78rem;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n}\n.scroll-cue__chevron {\n  width: 16px;\n  height: 16px;\n  border-right: 2.5px solid currentColor;\n  border-bottom: 2.5px solid currentColor;\n  transform: rotate(45deg);\n  animation: bob 1.6s var(--ease) infinite;\n}\n@keyframes bob {\n  0%, 100% { transform: translateY(0) rotate(45deg); opacity: 0.7; }\n  50%      { transform: translateY(6px) rotate(45deg); opacity: 1; }\n}\n.scroll-cue:focus-visible { outline: 3px solid var(--orange-soft); outline-offset: 3px; }\n\n/* ===================== Info section ===================== */\n.info {\n  background: var(--navy-deep);\n  border-top: 1px solid var(--line);\n  padding: clamp(4rem, 10vw, 8rem) clamp(1.25rem, 5vw, 3rem);\n}\n.info__inner {\n  max-width: 760px;\n  margin: 0 auto;\n  text-align: center;\n}\n.info__eyebrow {\n  margin: 0 0 1rem;\n  font-family: 'Space Grotesk', sans-serif;\n  text-transform: uppercase;\n  letter-spacing: 0.28em;\n  font-size: 0.78rem;\n  font-weight: 500;\n  color: var(--orange);\n}\n.info__heading {\n  font-weight: 700;\n  font-size: clamp(1.6rem, 3.6vw, 2.6rem);\n  line-height: 1.15;\n  text-wrap: balance;\n}\n.info__lead {\n  margin: 1.5rem auto 0;\n  max-width: 60ch;\n  font-size: clamp(1.02rem, 1.6vw, 1.18rem);\n  color: var(--muted);\n  text-wrap: pretty;\n}\n\n.features {\n  list-style: none;\n  margin: 2.5rem 0 0;\n  padding: 0;\n  display: flex;\n  flex-wrap: wrap;\n  justify-content: center;\n  gap: 0.75rem 1.25rem;\n}\n.feature {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.6rem;\n  padding: 0.65rem 1.15rem;\n  border: 1px solid var(--line);\n  border-radius: 999px;\n  background: rgba(255, 255, 255, 0.03);\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 500;\n  font-size: clamp(0.9rem, 1.5vw, 1rem);\n}\n.feature__dot {\n  width: 7px;\n  height: 7px;\n  border-radius: 999px;\n  background: var(--orange);\n  box-shadow: 0 0 10px rgba(240, 78, 35, 0.7);\n}\n.features + .btn { margin-top: 2.75rem; }\n\n/* ===================== Footer ===================== */\n.site-footer {\n  background: var(--navy);\n  border-top: 1px solid var(--line);\n  padding: 2.25rem clamp(1.25rem, 5vw, 3rem);\n}\n.site-footer__inner {\n  max-width: var(--maxw);\n  margin: 0 auto;\n  display: flex;\n  flex-wrap: wrap;\n  align-items: center;\n  justify-content: space-between;\n  gap: 1rem;\n}\n.site-footer__copy {\n  margin: 0;\n  font-size: 0.85rem;\n  color: var(--muted);\n}\n\n/* ===================== Responsive ===================== */\n@media (max-width: 420px) {\n  .countdown { gap: 0.55rem; max-width: 320px; }\n  .flip__card { width: calc(50vw - 1.6rem); height: calc((50vw - 1.6rem) * 1.34); }\n  .site-footer__inner { justify-content: center; text-align: center; }\n}\n\n/* ===================== Reduced motion ===================== */\n@media (prefers-reduced-motion: reduce) {\n  html { scroll-behavior: auto; }\n  .hero__bg,\n  .scroll-cue__chevron,\n  .flip--go .flip__top-flip,\n  .flip--go .flip__bottom-flip { animation: none !important; }\n  .btn { transition: none; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n\n  <!-- ===================== HERO ===================== -->\n  <header class=\"hero\" id=\"top\">\n    <div class=\"hero__bg\" aria-hidden=\"true\"><\u002Fdiv>\n\n    <div class=\"hero__brand\">\n      <a class=\"logo\" href=\"https://masshub.com/\" aria-label=\"MassHub home\">\n        <img class=\"logo__img\" src=\"fbf6f02f-a9cc-4e1d-b679-1a2f3b3fa5aa\" width=\"44\" height=\"44\" alt=\"MassHub\">\n        <span class=\"logo__word\">MassHub<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"hero__main\">\n      <h1 class=\"hero__title\">\n        <span class=\"t-white\">Built for Enthusiasts.<\u002Fspan>\n        <span class=\"t-orange\">Powered by Community.<\u002Fspan>\n      <\u002Fh1>\n\n      <p class=\"hero__kicker\">Launching in<\u002Fp>\n\n      <!-- ===== Flip countdown (working vanilla JS) ===== -->\n      <div class=\"countdown\" role=\"timer\" aria-label=\"Countdown to launch\">\n        <div class=\"flip\" data-unit=\"days\">\n          <div class=\"flip__card\">\n            <div class=\"flip__half flip__top\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__bottom\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__top-flip\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__bottom-flip\"><span>00<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flip__label\">Days<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flip\" data-unit=\"hours\">\n          <div class=\"flip__card\">\n            <div class=\"flip__half flip__top\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__bottom\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__top-flip\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__bottom-flip\"><span>00<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flip__label\">Hours<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flip\" data-unit=\"minutes\">\n          <div class=\"flip__card\">\n            <div class=\"flip__half flip__top\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__bottom\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__top-flip\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__bottom-flip\"><span>00<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flip__label\">Minutes<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flip\" data-unit=\"seconds\">\n          <div class=\"flip__card\">\n            <div class=\"flip__half flip__top\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__bottom\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__top-flip\"><span>00<\u002Fspan><\u002Fdiv>\n            <div class=\"flip__half flip__bottom-flip\"><span>00<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flip__label\">Seconds<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CTA: swap href for your real Formspree/Tally endpoint -->\n      <a class=\"btn btn--primary\" href=\"https://tally.so/r/REPLACE_WITH_FORM_ID\" target=\"_blank\" rel=\"noopener\">\n        Join the Waitlist\n      <\u002Fa>\n    <\u002Fdiv>\n\n    <a class=\"scroll-cue\" href=\"#info\" aria-label=\"Scroll to learn more\">\n      <span class=\"scroll-cue__text\">What is MassHub?<\u002Fspan>\n      <span class=\"scroll-cue__chevron\" aria-hidden=\"true\"><\u002Fspan>\n    <\u002Fa>\n  <\u002Fheader>\n\n  <!-- ===================== INFO ===================== -->\n  <main>\n    <section class=\"info\" id=\"info\">\n      <div class=\"info__inner\">\n        <p class=\"info__eyebrow\">The platform<\u002Fp>\n        <h2 class=\"info__heading\">A social platform connecting local cycling, motorcycling, and driving enthusiasts.<\u002Fh2>\n        <p class=\"info__lead\">Discover and connect with local riders and drivers who share your obsession. MassHub brings the people behind the passion together — organize group rides, find events near you, and build real community around the machines you love. No noise, no gatekeeping. Just enthusiasts, connected.<\u002Fp>\n\n        <ul class=\"features\">\n          <li class=\"feature\">\n            <span class=\"feature__dot\" aria-hidden=\"true\"><\u002Fspan>\n            <span class=\"feature__text\">Discover local enthusiasts<\u002Fspan>\n          <\u002Fli>\n          <li class=\"feature\">\n            <span class=\"feature__dot\" aria-hidden=\"true\"><\u002Fspan>\n            <span class=\"feature__text\">Find group rides &amp; events<\u002Fspan>\n          <\u002Fli>\n          <li class=\"feature\">\n            <span class=\"feature__dot\" aria-hidden=\"true\"><\u002Fspan>\n            <span class=\"feature__text\">Build real connections<\u002Fspan>\n          <\u002Fli>\n        <\u002Ful>\n\n        <a class=\"btn btn--primary\" href=\"https://tally.so/r/REPLACE_WITH_FORM_ID\" target=\"_blank\" rel=\"noopener\">\n          Join the Waitlist\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer class=\"site-footer\">\n      <div class=\"site-footer__inner\">\n        <a class=\"logo logo--sm\" href=\"https://masshub.com/\" aria-label=\"MassHub home\">\n          <img class=\"logo__img\" src=\"fbf6f02f-a9cc-4e1d-b679-1a2f3b3fa5aa\" width=\"30\" height=\"30\" alt=\"MassHub\">\n          <span class=\"logo__word\">MassHub<\u002Fspan>\n        <\u002Fa>\n        <p class=\"site-footer__copy\">© 2026 MassHub · Built for Enthusiasts. Powered by Community.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fmain>\n\n  <script src=\"58f6745f-5394-4248-b3be-1bb71062527c\" defer=\"\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
